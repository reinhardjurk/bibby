services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bibby
      POSTGRES_PASSWORD: bibby
      POSTGRES_DB: bibby
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibby"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      BIBBY_DATABASE_URL: postgresql+asyncpg://bibby:bibby@db:5432/bibby
      BIBBY_SECRET_KEY: dev-secret
      BIBBY_PUBLIC_BASE_URL: http://localhost:5173
      BIBBY_CORS_ORIGINS: '["http://localhost:5173"]'
      # E-Mail (TEM). Werte aus der Shell/.env; leere Defaults = nur loggen.
      # Test-Modus AN lassen, solange nicht bewusst echt versendet werden soll.
      BIBBY_MAIL_TEST_MODE: "${BIBBY_MAIL_TEST_MODE:-true}"
      BIBBY_MAIL_TEST_RECIPIENT: "${BIBBY_MAIL_TEST_RECIPIENT:-}"
      BIBBY_TEM_SECRET_KEY: "${BIBBY_TEM_SECRET_KEY:-}"
      BIBBY_TEM_PROJECT_ID: "${BIBBY_TEM_PROJECT_ID:-}"
      BIBBY_SCW_REGION: "${BIBBY_SCW_REGION:-fr-par}"
      BIBBY_TEM_FROM_EMAIL: "${BIBBY_TEM_FROM_EMAIL:-no-reply@bibby.example}"
      BIBBY_TEM_FROM_NAME: "${BIBBY_TEM_FROM_NAME:-Bibby}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Code live einbinden (Hot-Reload); installierte Deps liegen in /usr/local.
      - ./backend:/app
    # Migrationen anwenden, Seed einspielen, dann mit Reload starten.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
