services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bibby
      POSTGRES_PASSWORD: bibby
      POSTGRES_DB: bibby
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibby"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      BIBBY_DATABASE_URL: postgresql+asyncpg://bibby:bibby@db:5432/bibby
      BIBBY_SECRET_KEY: dev-secret
      BIBBY_PUBLIC_BASE_URL: http://localhost:5173
      BIBBY_CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Code live einbinden (Hot-Reload); installierte Deps liegen in /usr/local.
      - ./backend:/app
    # Migrationen anwenden, Seed einspielen, dann mit Reload starten.
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
